<!DOCTYPE html>

<head>

    <style>
        /*el background-image: url(la foto); sirve para poner la foto de fondo
        background-repeat:no-repeat; sirve para que no se repita tantas veces
        background-size: cover; sirve para definir la dimencion
        background-attachment: fixed; sirve para que al mover el contenido se quede quieto 
        background-position: center; sirve para que quede centrada en ese lugar*/
        body {
            background-image: url(asset/img/new\ york.png);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        header {
            display: flex;
            justify-content: center;
        }

        .conteiner-img {
            width: 500px;
            height: 300px;
            object-position: top;
            /*sirve para que aparezca visible la imagen, mantener la relacion de lo seleccionado*/
            object-fit: cover;
            /*sirve para que si la imagen no coincide con el*/
        }

        .conteiner-modelo-1 {
            width: 400px;
            height: 500px;
            padding: 10px;

        }

        .conteiner-modelo-2 {
            width: 400px;
            height: 500px;
            padding: 10px;
        }

        .conteiner-modelo-3 {
            width: 400px;
            height: 500px;
            padding: 10px;
        }

        .conteiner-modelo-4 {
            width: 400px;
            height: 500px;
            padding: 10px;
        }

        h3 {
            display: flex;
            text-align: center;
            justify-content: center;
            font-size: 30px;
            margin: 20px 0;
            padding: 20px;
            font-style: italic;
            color: rgb(196, 172, 39);
        }

        .modelo {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            width: 300px;
            height: 1200px;
            flex-direction: column;
            gap: 20px;
            margin-left: 200px;
            padding: 20px;
        }

        main {
            width: 1200px;
            margin: 0 auto;
        }

        .container-mo {
            display: flex;
            flex-direction: column;
        }

        .container-boton {
            width: 400px;
            height: 40px;
            background-color: rgb(236, 215, 94);
        }

        /*el text-decoration: none; sirve para sacarle la barrita de abajo de un link*/
        a {
            text-decoration: none;
        }

        .container-a {
            color: rgb(34, 31, 31);
            font-size: 15px;
            font-style: italic;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        .container-boton:hover {
            background-color: rgb(236, 215, 94);
            color: rgb(136, 116, 0);
            transform: scale(1.1);
            transition: transform 0.3 ease;
        }

        footer {
            display: flex;
            justify-content: center;
            background-color: gold;
            padding: 10px 20px;
            margin: 0 auto;
            gap: 10px;
            width: 1200px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgb(255, 215, 0);
        }
